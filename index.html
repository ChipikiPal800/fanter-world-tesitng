<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Fanter World | Prodigy-Style RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gameContainer">
  <canvas id="gameCanvas"></canvas>
  
  <!-- Paper-style Dialog Box -->
  <div id="dialogBox" class="dialog-hidden">
    <div class="dialog-name" id="dialogName"></div>
    <div class="dialog-text" id="dialogText"></div>
    <div class="dialog-arrow">▼</div>
  </div>
  
  <!-- Quest Tracker -->
  <div id="questTracker">
    <div class="quest-title">📜 CURRENT QUEST</div>
    <div class="quest-text" id="questText">Awaken and find Mewt</div>
    <div class="quest-subtext" id="questSubtext"></div>
  </div>
  
  <!-- Bottom Menu Bar -->
  <div id="menuBar">
    <button class="menu-btn" id="menuBtn">⚔️ MENU</button>
    <button class="menu-btn" id="forestBtn">🌲 FOREST</button>
    <button class="menu-btn" id="bagBtn">🎒 BAG</button>
    <button class="menu-btn" id="petsBtn">🐱 PETS</button>
    <button class="menu-btn" id="saveBtn">💾 SAVE</button>
  </div>
  
  <!-- Battle UI -->
  <div id="battleUI" class="battle-hidden">
    <div class="battle-hud">
      <div class="battle-card enemy">
        <div class="battle-name" id="battleEnemyName">SLIME</div>
        <div class="battle-hp-bar"><div class="battle-hp-fill" id="battleEnemyHpFill"></div></div>
        <div>❤️ <span id="battleEnemyHpText">0</span>/<span id="battleEnemyMaxHp">0</span></div>
      </div>
      <div class="battle-card player">
        <div class="battle-name">🐱 MEWT</div>
        <div class="battle-hp-bar"><div class="battle-hp-fill" id="battlePetHpFill"></div></div>
        <div>❤️ <span id="battlePetHpText">0</span>/<span id="battlePetMaxHp">0</span></div>
      </div>
    </div>
    <div class="battle-actions">
      <div class="battle-math">
        <div class="math-question" id="mathQuestion">2 + 2 = ?</div>
        <div class="math-options" id="mathOptions"></div>
      </div>
      <div class="battle-message" id="battleMessage">A wild enemy appeared!</div>
      <button class="battle-run" id="runBtn">🏃 RUN</button>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // FANTER WORLD - COMPLETE GAME (ALL IN ONE)
  // ============================================================
  
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  
  // Set canvas to full screen
  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();
  
  // ============================================================
  // WORLD SETUP
  // ============================================================
  const WORLD_W = 3500;
  const WORLD_H = 3500;
  let camX = 0;
  let camY = 0;
  
  // Trees
  const trees = [];
  for (let i = 0; i < 80; i++) {
    trees.push({
      x: 200 + Math.random() * (WORLD_W - 400),
      y: 200 + Math.random() * (WORLD_H - 400),
      size: 20 + Math.random() * 10
    });
  }
  
  // Enemies
  let enemies = [
    { id: 'slime', name: 'SLIME', x: 800, y: 600, hp: 30, maxHp: 30, attack: 7, exp: 35, coins: 25, color: '#86efac' },
    { id: 'slime', name: 'SLIME', x: 1200, y: 900, hp: 30, maxHp: 30, attack: 7, exp: 35, coins: 25, color: '#86efac' },
    { id: 'goblin', name: 'GOBLIN', x: 1600, y: 1100, hp: 40, maxHp: 40, attack: 9, exp: 50, coins: 35, color: '#fbbf24' },
  ];
  
  // ============================================================
  // PLAYER & PET
  // ============================================================
  let player = {
    x: WORLD_W/2,
    y: WORLD_H/2,
    targetX: WORLD_W/2,
    targetY: WORLD_H/2,
    speed: 4,
    walkCycle: 0
  };
  
  let pet = {
    x: player.x - 45,
    y: player.y,
    walkCycle: 0
  };
  
  let gameState = {
    playerLevel: 1,
    playerExp: 0,
    playerCoins: 150,
    currentArea: 'plains',
    hasWand: false,
    hasRobe: false,
    pet: {
      name: 'MEWT',
      hp: 45,
      maxHp: 45,
      attack: 12,
      defense: 8,
      level: 1,
      color: '#22c55e'
    }
  };
  
  // Movement keys
  let keys = { w: false, s: false, a: false, d: false };
  
  // Battle state
  let inBattle = false;
  let currentEnemy = null;
  let battlePetHp = gameState.pet.hp;
  let battleEnemyHp = 0;
  let currentQuestion = null;
  let isAnimating = false;
  
  // Math questions
  const mathQuestions = [
    { q: "1 + 1 = ?", a: 2, opts: [0,1,2,3] },
    { q: "2 + 2 = ?", a: 4, opts: [2,3,4,5] },
    { q: "3 + 1 = ?", a: 4, opts: [2,3,4,5] },
    { q: "5 - 2 = ?", a: 3, opts: [1,2,3,4] },
    { q: "2 + 3 = ?", a: 5, opts: [3,4,5,6] },
    { q: "4 - 1 = ?", a: 3, opts: [1,2,3,4] },
  ];
  
  function getRandomQuestion() {
    return { ...mathQuestions[Math.floor(Math.random() * mathQuestions.length)] };
  }
  
  // ============================================================
  // COLLISION
  // ============================================================
  function checkCollision(x, y, r) {
    for (const tree of trees) {
      if (Math.hypot(x - tree.x, y - tree.y) < r + 12) return true;
    }
    if (x < r || x > WORLD_W - r) return true;
    if (y < r || y > WORLD_H - r) return true;
    return false;
  }
  
  // ============================================================
  // MOVEMENT
  // ============================================================
  function handleMovement() {
    if (inBattle) return;
    
    let mx = 0, my = 0;
    if (keys.w) my -= 1;
    if (keys.s) my += 1;
    if (keys.a) mx -= 1;
    if (keys.d) mx += 1;
    
    if (mx !== 0 || my !== 0) {
      const len = Math.hypot(mx, my);
      mx /= len;
      my /= len;
      
      let nx = player.x + mx * player.speed;
      let ny = player.y + my * player.speed;
      
      if (!checkCollision(nx, player.y, 20)) player.x = nx;
      if (!checkCollision(player.x, ny, 20)) player.y = ny;
      
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
    
    // Pet follow
    const angle = Math.atan2(player.y - pet.y, player.x - pet.x);
    pet.x += Math.cos(angle) * 2.8;
    pet.y += Math.sin(angle) * 2.8;
    pet.walkCycle += 0.1;
    
    // Camera follow
    camX = player.x - canvas.width/2;
    camY = player.y - canvas.height/2;
    camX = Math.max(0, Math.min(camX, WORLD_W - canvas.width));
    camY = Math.max(0, Math.min(camY, WORLD_H - canvas.height));
    
    // Enemy collision
    for (const e of enemies) {
      if (Math.hypot(player.x - e.x, player.y - e.y) < 40 && !inBattle) {
        startBattle(e);
        break;
      }
    }
  }
  
  function handleClickMove(e) {
    if (inBattle) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
    player.targetX = camX + mouseX;
    player.targetY = camY + mouseY;
  }
  
  function updateClickMove() {
    if (inBattle) return;
    const dx = player.targetX - player.x;
    const dy = player.targetY - player.y;
    const dist = Math.hypot(dx, dy);
    
    if (dist > 3) {
      const mx = (dx / dist) * player.speed;
      const my = (dy / dist) * player.speed;
      let nx = player.x + mx;
      let ny = player.y + my;
      if (!checkCollision(nx, player.y, 20)) player.x = nx;
      if (!checkCollision(player.x, ny, 20)) player.y = ny;
      player.walkCycle += 0.15;
    } else {
      player.walkCycle = 0;
    }
  }
  
  // ============================================================
  // BATTLE SYSTEM
  // ============================================================
  function startBattle(enemy) {
    inBattle = true;
    currentEnemy = { ...enemy };
    battleEnemyHp = currentEnemy.hp;
    battlePetHp = gameState.pet.hp;
    currentQuestion = getRandomQuestion();
    
    document.getElementById('battleEnemyName').textContent = currentEnemy.name;
    document.getElementById('battleEnemyHpText').textContent = battleEnemyHp;
    document.getElementById('battleEnemyMaxHp').textContent = currentEnemy.maxHp;
    document.getElementById('battlePetHpText').textContent = battlePetHp;
    document.getElementById('battlePetMaxHp').textContent = gameState.pet.maxHp;
    document.getElementById('mathQuestion').textContent = currentQuestion.q;
    document.getElementById('battleMessage').innerHTML = `Wild ${currentEnemy.name} appeared!`;
    
    updateBattleBars();
    renderMathOptions();
    document.getElementById('battleUI').style.display = 'flex';
  }
  
  function renderMathOptions() {
    const container = document.getElementById('mathOptions');
    container.innerHTML = '';
    currentQuestion.opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'math-opt-btn';
      btn.textContent = opt;
      btn.onclick = () => handleBattleAnswer(opt);
      container.appendChild(btn);
    });
  }
  
  function updateBattleBars() {
    const enemyPercent = (battleEnemyHp / currentEnemy.maxHp) * 100;
    const petPercent = (battlePetHp / gameState.pet.maxHp) * 100;
    document.getElementById('battleEnemyHpFill').style.width = `${Math.max(0, enemyPercent)}%`;
    document.getElementById('battlePetHpFill').style.width = `${Math.max(0, petPercent)}%`;
    document.getElementById('battleEnemyHpText').textContent = Math.max(0, battleEnemyHp);
    document.getElementById('battlePetHpText').textContent = Math.max(0, battlePetHp);
  }
  
  async function handleBattleAnswer(answer) {
    if (isAnimating) return;
    isAnimating = true;
    
    const battleDiv = document.getElementById('battleUI');
    battleDiv.classList.add('shake-effect', 'flash-effect');
    setTimeout(() => {
      battleDiv.classList.remove('shake-effect', 'flash-effect');
    }, 300);
    
    if (answer === currentQuestion.a) {
      const damage = Math.floor(Math.random() * 12) + 10;
      battleEnemyHp -= damage;
      document.getElementById('battleMessage').innerHTML = `Correct! ${damage} damage!`;
      updateBattleBars();
      
      if (battleEnemyHp <= 0) {
        setTimeout(() => winBattle(), 800);
        isAnimating = false;
        return;
      }
      setTimeout(() => enemyTurn(), 1000);
    } else {
      document.getElementById('battleMessage').innerHTML = `Wrong! Answer was ${currentQuestion.a}. ${currentEnemy.name} attacks!`;
      const damage = Math.floor(Math.random() * currentEnemy.attack) + 4;
      const reduced = Math.max(1, damage - Math.floor(gameState.pet.defense / 3));
      battlePetHp -= reduced;
      updateBattleBars();
      
      if (battlePetHp <= 0) {
        setTimeout(() => loseBattle(), 800);
        isAnimating = false;
        return;
      }
      
      currentQuestion = getRandomQuestion();
      document.getElementById('mathQuestion').textContent = currentQuestion.q;
      renderMathOptions();
      document.getElementById('battleMessage').innerHTML = `What will you do?`;
    }
    isAnimating = false;
  }
  
  function enemyTurn() {
    if (!inBattle || battleEnemyHp <= 0) return;
    
    const damage = Math.floor(Math.random() * currentEnemy.attack) + 4;
    const reduced = Math.max(1, damage - Math.floor(gameState.pet.defense / 3));
    battlePetHp -= reduced;
    document.getElementById('battleMessage').innerHTML = `${currentEnemy.name} deals ${reduced} damage!`;
    updateBattleBars();
    
    const battleDiv = document.getElementById('battleUI');
    battleDiv.classList.add('shake-effect', 'flash-effect');
    setTimeout(() => {
      battleDiv.classList.remove('shake-effect', 'flash-effect');
    }, 300);
    
    if (battlePetHp <= 0) {
      setTimeout(() => loseBattle(), 800);
      return;
    }
    
    currentQuestion = getRandomQuestion();
    document.getElementById('mathQuestion').textContent = currentQuestion.q;
    renderMathOptions();
    document.getElementById('battleMessage').innerHTML = `What will you do?`;
  }
  
  function winBattle() {
    const expGain = currentEnemy.exp;
    const coinGain = currentEnemy.coins;
    
    gameState.playerExp += expGain;
    gameState.playerCoins += coinGain;
    
    let message = `Victory! +${expGain} XP, +${coinGain} coins!`;
    
    // Level up
    const needed = (gameState.playerLevel + 1) * 50;
    if (gameState.playerExp >= needed) {
      gameState.playerLevel++;
      gameState.playerExp -= needed;
      message += `\n✨ You grew to Lv${gameState.playerLevel}! ✨`;
    }
    
    document.getElementById('battleMessage').innerHTML = message;
    
    // Remove defeated enemy
    const index = enemies.findIndex(e => e.x === currentEnemy.x && e.y === currentEnemy.y);
    if (index !== -1) enemies.splice(index, 1);
    
    setTimeout(() => {
      document.getElementById('battleUI').style.display = 'none';
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 3000);
  }
  
  function loseBattle() {
    document.getElementById('battleMessage').innerHTML = `You fainted... Running to heal!`;
    setTimeout(() => {
      document.getElementById('battleUI').style.display = 'none';
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 2000);
  }
  
  function runBattle() {
    document.getElementById('battleMessage').innerHTML = `Got away safely!`;
    setTimeout(() => {
      document.getElementById('battleUI').style.display = 'none';
      inBattle = false;
      currentEnemy = null;
      isAnimating = false;
    }, 800);
  }
  
  // ============================================================
  // DRAW FUNCTIONS
  // ============================================================
  function drawGround() {
    ctx.fillStyle = '#3a7a33';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grass texture
    for (let i = 0; i < 600; i++) {
      ctx.fillStyle = '#5a9e4b';
      ctx.fillRect((i * 131) % canvas.width, (i * 253) % canvas.height, 2, 2);
    }
  }
  
  function drawTrees() {
    for (const tree of trees) {
      const x = tree.x - camX;
      const y = tree.y - camY;
      if (x > -60 && x < canvas.width + 60 && y > -80 && y < canvas.height + 80) {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.beginPath();
        ctx.ellipse(x + 3, y + 25, 14, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#8B5A2B';
        ctx.fillRect(x - 5, y + 5, 10, 20);
        ctx.fillStyle = '#2d6e2d';
        ctx.beginPath();
        ctx.arc(x, y - 3, 16, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#4ade80';
        ctx.beginPath();
        ctx.arc(x - 4, y - 8, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(x + 4, y - 8, 8, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
  
  function drawMapEnemies() {
    for (const e of enemies) {
      const x = e.x - camX;
      const y = e.y - camY;
      if (x > -60 && x < canvas.width + 60 && y > -80 && y < canvas.height + 80) {
        const bounce = Math.sin(Date.now() / 200) * 2;
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath();
        ctx.ellipse(x + 2, y + 18 + bounce, 12, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = e.color;
        ctx.beginPath();
        ctx.arc(x, y + 5 + bounce, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 6, y + 1 + bounce, 4, 4);
        ctx.fillRect(x + 2, y + 1 + bounce, 4, 4);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(x - 5, y + 2 + bounce, 2, 3);
        ctx.fillRect(x + 3, y + 2 + bounce, 2, 3);
      }
    }
  }
  
  function drawPlayer() {
    const x = player.x - camX;
    const y = player.y - camY;
    const bob = Math.sin(Date.now() / 180) * 1.5;
    const legSwing = Math.sin(player.walkCycle * Math.PI) * 4;
    
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(x + 3, y + 28, 14, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.moveTo(x - 11, y - 2 + bob);
    ctx.quadraticCurveTo(x - 5, y + 16 + bob, x, y + 20 + bob);
    ctx.quadraticCurveTo(x + 5, y + 16 + bob, x + 11, y - 2 + bob);
    ctx.fill();
    
    ctx.fillStyle = '#3b82f6';
    ctx.fillRect(x - 11, y - 7 + bob, 22, 28);
    
    ctx.fillStyle = '#2563eb';
    ctx.fillRect(x - 8 + legSwing * 0.4, y + 17 + bob, 6, 13);
    ctx.fillRect(x + 2 - legSwing * 0.4, y + 17 + bob, 6, 13);
    
    ctx.fillStyle = '#fcd34d';
    ctx.beginPath();
    ctx.arc(x, y - 12 + bob, 13, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#d97706';
    ctx.fillRect(x - 9, y - 23 + bob, 18, 7);
    
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 5, y - 15 + bob, 3, 4);
    ctx.fillRect(x + 2, y - 15 + bob, 3, 4);
  }
  
  function drawPet() {
    const x = pet.x - camX;
    const y = pet.y - camY;
    const bob = Math.sin(Date.now() / 160) * 1.5;
    const runCycle = Math.sin(pet.walkCycle * Math.PI * 2) * 3;
    
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + 20, 11, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#22c55e';
    ctx.fillRect(x - 9, y - 2 + bob, 18, 20);
    
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(x + 10, y + 4 + bob, 8 + runCycle * 0.5, 4);
    
    ctx.fillStyle = '#22c55e';
    ctx.beginPath();
    ctx.arc(x, y - 8 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#16a34a';
    ctx.fillRect(x - 7, y - 15 + bob, 4, 7);
    ctx.fillRect(x + 3, y - 15 + bob, 4, 7);
    
    ctx.fillStyle = '#fff';
    ctx.fillRect(x - 4, y - 11 + bob, 3, 4);
    ctx.fillRect(x + 1, y - 11 + bob, 3, 4);
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(x - 3, y - 10 + bob, 2, 3);
    ctx.fillRect(x + 2, y - 10 + bob, 2, 3);
    
    ctx.fillStyle = '#ef4444';
    ctx.fillRect(x - 1, y - 6 + bob, 2, 2);
  }
  
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  function saveGame() {
    localStorage.setItem('fanterWorldSave', JSON.stringify({
      playerLevel: gameState.playerLevel,
      playerExp: gameState.playerExp,
      playerCoins: gameState.playerCoins,
      playerX: player.x,
      playerY: player.y
    }));
    showToast('✅ Game saved!');
  }
  
  function loadGame() {
    const saved = localStorage.getItem('fanterWorldSave');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        gameState.playerLevel = data.playerLevel || 1;
        gameState.playerExp = data.playerExp || 0;
        gameState.playerCoins = data.playerCoins || 150;
        player.x = data.playerX || WORLD_W/2;
        player.y = data.playerY || WORLD_H/2;
        player.targetX = player.x;
        player.targetY = player.y;
        showToast('Game loaded!');
      } catch(e) {}
    }
  }
  
  // ============================================================
  // FOREST BUTTON
  // ============================================================
  document.getElementById('forestBtn').addEventListener('click', () => {
    if (confirm('Teleport to the Whispering Woods?')) {
      player.x = 1800;
      player.y = 1400;
      player.targetX = 1800;
      player.targetY = 1400;
      showToast('🌲 Welcome to the Whispering Woods!');
    }
  });
  
  // ============================================================
  // MENU BUTTONS
  // ============================================================
  document.getElementById('menuBtn').addEventListener('click', () => {
    alert(`⚔️ STATS\nLevel: ${gameState.playerLevel}\nXP: ${gameState.playerExp}\nCoins: ${gameState.playerCoins}\n\n🐱 MEWT\nHP: ${gameState.pet.hp}/${gameState.pet.maxHp}\nAttack: ${gameState.pet.attack}\nDefense: ${gameState.pet.defense}`);
  });
  
  document.getElementById('bagBtn').addEventListener('click', () => {
    alert(`🎒 YOUR BAG\n🪙 ${gameState.playerCoins} coins\n⭐ ${gameState.playerExp} XP`);
  });
  
  document.getElementById('petsBtn').addEventListener('click', () => {
    alert(`🐱 MEWT - Level ${gameState.pet.level}\n❤️ HP: ${gameState.pet.hp}/${gameState.pet.maxHp}\n⚔️ Attack: ${gameState.pet.attack}\n🛡️ Defense: ${gameState.pet.defense}`);
  });
  
  document.getElementById('saveBtn').addEventListener('click', saveGame);
  document.getElementById('runBtn').addEventListener('click', runBattle);
  
  // ============================================================
  // KEYBOARD CONTROLS
  // ============================================================
  document.addEventListener('keydown', (e) => {
    if (inBattle) return;
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = true;
    if (k === 's') keys.s = true;
    if (k === 'a') keys.a = true;
    if (k === 'd') keys.d = true;
  });
  
  document.addEventListener('keyup', (e) => {
    const k = e.key.toLowerCase();
    if (k === 'w') keys.w = false;
    if (k === 's') keys.s = false;
    if (k === 'a') keys.a = false;
    if (k === 'd') keys.d = false;
  });
  
  canvas.addEventListener('click', handleClickMove);
  
  // ============================================================
  // ANIMATION LOOP
  // ============================================================
  function animate() {
    handleMovement();
    updateClickMove();
    
    drawGround();
    drawTrees();
    drawMapEnemies();
    drawPet();
    drawPlayer();
    
    requestAnimationFrame(animate);
  }
  
  // ============================================================
  // INIT
  // ============================================================
  loadGame();
  animate();
</script>
</body>
</html>
